name: Deploy Godot Web Build to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.7
    defaults:
      run:
        working-directory: ape/godot
    steps:
      - uses: actions/checkout@v4

      - name: Move export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.7.stable ~/.local/share/godot/export_templates/4.7.stable

      - name: Export Web build
        run: |
          mkdir -v -p build/web
          godot --headless --verbose --export-release "Web"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ape/godot/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
